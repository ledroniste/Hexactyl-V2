version: '3.8'

services:
  panel:
    image: ghcr.io/pterodactyl/panel:latest
    container_name: hexactyl_panel
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ../panel:/var/www/html
    environment:
      - APP_ENV=production
    depends_on:
      - mariadb
      - redis

  mariadb:
    image: mariadb:10.6
    container_name: hexactyl_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: hexactyl
      MYSQL_USER: hexactyl
      MYSQL_PASSWORD: strongpassword
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:alpine
    container_name: hexactyl_redis
    restart: always

volumes:
  db_data:
